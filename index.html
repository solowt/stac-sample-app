<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="stylesheet" href="https://js.arcgis.com/calcite-components/5.0.2/calcite.css" />
    <link rel="stylesheet" href="./index.css" />
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
  </head>
  <body>
    <calcite-shell>
      <calcite-shell-panel slot="panel-start" width-scale="l" position="start" id="shell-panel-start">
        <calcite-action-bar slot="action-bar">
          <calcite-action active icon="collection" text="Collections" text-enabled></calcite-action>
          <calcite-action icon="search" text="Search" text-enabled></calcite-action>
        </calcite-action-bar>
        <calcite-panel heading="Collections" loading id="collections-panel">
        </calcite-panel>
        <calcite-panel heading="Item" loading id="item-panel" closable closed>
          <div id="item-panel-content"></div>
        </calcite-panel>
        <calcite-panel heading="Search" id="search-panel" closed>
        </calcite-panel>
      </calcite-shell-panel>
      <calcite-panel heading="STAC Integration Test App">
        <arcgis-scene ground="world-elevation" basemap="dark-gray-3d" center="-154.88, 19.46" zoom="15" popup-component-enabled>
          <arcgis-layer-list slot="top-right"></arcgis-layer-list>
        </arcgis-scene>
      </calcite-panel>
    </calcite-shell>
  </body>

  <script type="module" src="./index.js">
  </script>
</html>
